spring.application.name=ms-tickets
server.port=${SERVER_PORT:8085}
jwt.secret=${JWT_SECRET}
app.security.docs-public=false

# ===============================
# DATABASE CONFIGURATION (MySQL - Production)
# ===============================
spring.datasource.url=jdbc:mysql://${TICKETS_MYSQL_HOST}:${TICKETS_MYSQL_PORT}/${TICKETS_MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${TICKETS_MYSQL_USERNAME}
spring.datasource.password=${TICKETS_MYSQL_PASSWORD}

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ===============================
# RABBITMQ CONFIGURATION (Production)
# ===============================
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# RabbitMQ Exchange, Queue y Routing Key
rabbitmq.exchange.name=tickets.exchange
rabbitmq.queue.name=tickets.queue
rabbitmq.routing.key=tickets.routing.key

# ===============================
# ACTUATOR CONFIGURATION
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
spring.h2.console.enabled=false

# ===============================
# SWAGGER / OPENAPI CONFIGURATION
# ===============================
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
