spring.application.name=ms-tickets
spring.profiles.default=dev
server.port=${SERVER_PORT:8085}
jwt.secret=${JWT_SECRET}
app.security.docs-public=${APP_SECURITY_DOCS_PUBLIC:true}
logging.pattern.level=%5p [requestId=%X{requestId:-na}]

# ===============================
# DATABASE CONFIGURATION (H2 - Development)
# ===============================
spring.datasource.url=jdbc:h2:mem:tickets_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# RABBITMQ CONFIGURATION
# ===============================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME:rabbit_local_user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:rabbit_local_password}

# RabbitMQ Exchange, Queue y Routing Key
rabbitmq.exchange.name=tickets.exchange
rabbitmq.queue.name=tickets.queue
rabbitmq.routing.key=tickets.routing.key

# ===============================
# ACTUATOR CONFIGURATION
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# SWAGGER / OPENAPI CONFIGURATION
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
